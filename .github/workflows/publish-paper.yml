name: publish-paper

on:
  schedule:
    # KST 12:00 = UTC 03:00 — 매일 1회 (논문 리뷰)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Find & publish one ready draft from _drafts/paper
        id: pub
        run: |
          set -e
          python scripts/publish_one.py paper
        continue-on-error: true

      - name: Commit & push if changed
        if: steps.pub.outcome == 'success'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add _posts _drafts
            git commit -m "auto-publish: paper"
            git push
          else
            echo "no changes to commit"
          fi
